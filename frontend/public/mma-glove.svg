<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- MMA Glove -->
  <!-- Wrist/cuff -->
  <rect x="30" y="72" width="40" height="20" rx="4" fill="#cc0000"/>
  <rect x="30" y="72" width="40" height="6" rx="2" fill="#990000"/>

  <!-- Main glove body -->
  <ellipse cx="50" cy="55" rx="22" ry="26" fill="#cc0000"/>

  <!-- Fingers area (top of glove) -->
  <!-- Index finger -->
  <rect x="32" y="22" width="10" height="20" rx="5" fill="#cc0000"/>
  <!-- Middle finger -->
  <rect x="43" y="18" width="10" height="22" rx="5" fill="#cc0000"/>
  <!-- Ring finger -->
  <rect x="54" y="20" width="10" height="20" rx="5" fill="#cc0000"/>
  <!-- Pinky -->
  <rect x="65" y="26" width="8" height="16" rx="4" fill="#cc0000"/>

  <!-- Thumb -->
  <ellipse cx="28" cy="44" rx="7" ry="10" fill="#cc0000" transform="rotate(-20 28 44)"/>

  <!-- Knuckle padding (open palm side detail) -->
  <ellipse cx="37" cy="42" rx="4" ry="3" fill="#aa0000"/>
  <ellipse cx="48" cy="39" rx="4" ry="3" fill="#aa0000"/>
  <ellipse cx="59" cy="41" rx="4" ry="3" fill="#aa0000"/>

  <!-- Velcro strap line -->
  <rect x="30" y="74" width="40" height="3" rx="1" fill="#ff3333" opacity="0.6"/>

  <!-- White label area on wrist -->
  <rect x="36" y="78" width="28" height="10" rx="2" fill="white" opacity="0.2"/>
</svg>
